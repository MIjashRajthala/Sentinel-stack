# =============================================================================
# Wazuh Dashboard — OpenSearch Dashboards Configuration
# =============================================================================

server.port: 5601
server.host: 0.0.0.0
server.name: "shog-wazuh-dashboard"

# OpenSearch connection
opensearch.hosts: ["https://wazuh-indexer:9200"]
opensearch.ssl.verificationMode: none
opensearch.requestHeadersAllowlist: ["securitytenant","Authorization"]
opensearch_security.multitenancy.enabled: true
opensearch_security.multitenancy.tenants.preferred: ["Private","Global"]
opensearch_security.readonly_mode.roles: ["kibana_read_only"]
server.ssl.enabled: true
server.ssl.key: "/usr/share/wazuh-indexer/demo-certificates/dashboard-key.pem"
server.ssl.certificate: "/usr/share/wazuh-indexer/demo-certificates/dashboard.pem"
opensearch.ssl.certificateAuthorities: ["/usr/share/wazuh-indexer/demo-certificates/root-ca.pem"]

# Security
opensearch_security.cookie.secure: true
opensearch_security.cookie.isSameSite: Strict

# Feature controls
opensearchDashboards.branding:
  useExpandedHeader: false

# Logging
logging.verbose: false
logging.quiet: true

# Saved objects
savedObjects.maxImportPayloadBytes: 10485760
savedObjects.maxImportExportSize: 10000

# UI settings
uiSettings.overrides.defaultRoute: /app/wazuh

# CSP for security headers
csp.rules: ["connect-src 'self' https://wazuh-indexer:9200;", "default-src 'self'"]
