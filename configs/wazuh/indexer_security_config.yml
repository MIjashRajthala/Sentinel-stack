# =============================================================================
# Wazuh Indexer Security Plugin Configuration
# =============================================================================
# Internal users, roles, and authentication settings.
# This is the initial bootstrap configuration.
# =============================================================================

config:
  dynamic:
    # Set to 'true' after initial bootstrap to prevent accidental changes
    # Do NOT disable after first run unless you intend to reset security
    # authc:
    #   basic_internal_auth_domain:
    #     description: "Authenticate via internal user database"
    #     http_enabled: true
    #     transport_enabled: true
    #     order: 0
    #     http_authenticator:
    #       type: basic
    #       challenge: true
    #     authentication_backend:
    #       type: internal

    authz:
      roles_from_internal:
        description: "Read roles from internal database"
        http_enabled: true
        transport_enabled: true
        authorization_backend:
          type: internal

    # Disable demo mode flags after initial setup
    # Set these via environment or securityadmin script after bootstrap
    do_not_fail_on_forbidden: false
    kibana:
      multitenancy_enabled: true
      server_username: kibanaserver
      index: '.kibana'
    http:
      anonymous_auth_enabled: false
      xff:
        enabled: false
