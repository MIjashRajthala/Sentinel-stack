# =============================================================================
# Unbound Configuration — Local Recursive DNS Resolver
# =============================================================================
# Resolves queries from Pi-hole using root servers directly.
# No forwarding to external DNS providers.
# =============================================================================

server:
    # Interface and port
    interface: 0.0.0.0
    port: 53

    # Only accept queries from Pi-hole (adjust if needed)
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 10.0.0.0/8 allow
    access-control: 192.168.0.0/16 allow
    access-control: 0.0.0.0/0 refuse

    # Security
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    qname-minimisation: yes
    use-caps-for-id: yes
    harden-large-queries: yes
    harden-short-bufsize: yes

    # Privacy
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4
    cache-min-ttl: 300
    cache-max-ttl: 86400
    rrset-cache-size: 128m
    msg-cache-size: 64m
    so-rcvbuf: 1m
    so-sndbuf: 1m

    # Performance
    num-threads: 2
    prefetch: yes
    prefetch-key: yes
    target-fetch-policy: "3 2 1 0 0"

    # Logging (minimal for privacy)
    verbosity: 1
    log-queries: no
    log-replies: no
    log-servfail: yes

    # Root hints
    root-hints: "/opt/unbound/etc/unbound/root.hints"

    # Auto-trust anchor for DNSSEC
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/var/root.key"

    # Certificate bundle for DNS over TLS (if enabled later)
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

    # Deny ANY queries (amplification protection)
    deny-any: yes

    # EDNS buffer size
    edns-buffer-size: 1232

    # Limits
    outgoing-range: 8192
    num-queries-per-thread: 4096
    jostle-timeout: 200
    delay-close: 10000

    # Prevent DNS rebinding
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # Local zones (RFC 6761)
    local-zone: "localhost." nodefault
    local-zone: "127.in-addr.arpa." nodefault

    # Serve stale cache briefly on lookup failure
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-ttl-reset: yes

    # edns-tcp-keepalive for efficiency
    edns-tcp-keepalive: yes
    edns-tcp-keepalive-timeout: 120000

    # Ratelimiting
    ratelimit: 1000
    ip-ratelimit: 1000

    # Privacy: minimal response
    minimal-responses: yes

    # Use systemd socket activation (not in Docker)
    use-systemd: no

# Remote control (disabled for security)
remote-control:
    control-enable: no

# Statistics (disabled)
statistics-interval: 0
extended-statistics: no
statistics-cumulative: no
