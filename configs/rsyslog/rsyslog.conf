# =============================================================================
# Rsyslog Configuration — Central Syslog Receiver
# =============================================================================
# Receives logs from pfSense and Suricata, stores them locally for
# Filebeat/Wazuh ingestion.
# =============================================================================

# Global directives
$AbortOnUncleanConfig off
$WorkDirectory /var/spool/rsyslog
$FileOwner root
$FileGroup adm
$FileCreateMode 0640
$DirCreateMode 0755
$Umask 0022

# Impose limits to prevent resource exhaustion
$MaxMessageSize 64k
$SystemLogRateLimitInterval 60
$SystemLogRateLimitBurst 10000

# =============================================================================
# MODULES
# =============================================================================

module(load="imudp" threads="2" timeRequery="8" batchSize="128")
module(load="imtcp" MaxSessions="500" StreamDriver.Mode="0")
module(load="immark" interval="3600")

# =============================================================================
# INPUTS
# =============================================================================

# UDP syslog
input(type="imudp" port="514" ruleset="remote")

# TCP syslog
input(type="imtcp" port="514" ruleset="remote")

# =============================================================================
# TEMPLATES
# =============================================================================

template(name="RemoteLogFile" type="string" string="/var/log/remote/%fromhost-ip%/%programname%.log")
template(name="RemoteLogDir"  type="string" string="/var/log/remote/%fromhost-ip%")
template(name="SuricataEve"   type="string" string="/var/log/remote/%fromhost-ip%/suricata-eve.json")
template(name="JSONFormat"    type="string" string='<%PRI%>%TIMESTAMP:::date-rfc3339% %HOSTNAME% %syslogtag%%msg%\n')

# =============================================================================
# RULESETS
# =============================================================================

ruleset(name="remote") {
    # Create directory per source IP
    $CreateDirs on

    # pfSense filter logs (firewall)
    if $programname == 'filterlog' then {
        action(type="omfile" dynaFile="RemoteLogFile" template="JSONFormat")
        stop
    }

    # Suricata EVE JSON — write as-is
    if $programname == 'suricata' and $msg startswith ' {"timestamp' then {
        action(type="omfile" dynaFile="SuricataEve")
        stop
    }

    # Suricata alerts
    if $programname == 'suricata' then {
        action(type="omfile" dynaFile="RemoteLogFile" template="JSONFormat")
        stop
    }

    # dhcpd
    if $programname == 'dhcpd' then {
        action(type="omfile" dynaFile="RemoteLogFile" template="JSONFormat")
        stop
    }

    # unbound (DNS resolver on pfSense if used)
    if $programname == 'unbound' then {
        action(type="omfile" dynaFile="RemoteLogFile" template="JSONFormat")
        stop
    }

    # nginx (if using pfSense nginx)
    if $programname == 'nginx' then {
        action(type="omfile" dynaFile="RemoteLogFile" template="JSONFormat")
        stop
    }

    # php-fpm (pfSense web UI errors)
    if $programname == 'php-fpm' then {
        action(type="omfile" dynaFile="RemoteLogFile" template="JSONFormat")
        stop
    }

    # General catch-all for everything else from this host
    action(type="omfile" dynaFile="RemoteLogFile" template="JSONFormat")
}

# =============================================================================
# LOCAL LOGGING (container's own logs)
# =============================================================================

*.info;mail.none;authpriv.none;cron.none   /var/log/messages
authpriv.*                                  /var/log/secure
mail.*                                      /var/log/maillog
cron.*                                      /var/log/cron
*.emerg                                     :omusrmsg:*
uucp,news.crit                              /var/log/spooler
local7.*                                    /var/log/boot.log

# =============================================================================
# LOG ROTATION (via logrotate inside container)
# =============================================================================
# Logrotate is not included in this minimal image.
# Rotate logs externally via host logrotate or cron job calling:
#   docker exec shog-rsyslog logrotate /etc/logrotate.d/rsyslog-remote
# Or use the host's logrotate with the docker logs path.
